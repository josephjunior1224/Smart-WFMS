<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your QR Code - BNS WFMS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0B0B0B;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .qr-container {
      background: #1a1a1a;
      border: 1px solid #2d2d2d;
      border-radius: 24px;
      padding: 30px;
      max-width: 500px;
      width: 100%;
      text-align: center;
    }
    .bns-letters { display: flex; justify-content: center; gap: 5px; font-size: 28px; font-weight: 900; }
    .bns-letters span { background: linear-gradient(135deg, #00F0FF, #4EC9B0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    h1 { color: white; font-size: 22px; margin: 15px 0 5px; }
    .qr-code { background: white; padding: 20px; border-radius: 16px; display: inline-block; margin: 15px 0; }
    .qr-code img { width: 280px; height: 280px; display: block; }
    .token-box {
      background: #0B0B0B;
      padding: 12px;
      border-radius: 8px;
      margin: 15px 0;
      border: 1px solid #00F0FF;
    }
    .token-box p { color: #9ca3af; font-size: 12px; margin-bottom: 8px; }
    .token-value {
      font-family: monospace;
      font-size: 14px;
      color: #00F0FF;
      word-break: break-all;
      background: #0B0B0B;
      padding: 8px;
      border-radius: 4px;
    }
    .button-group { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 15px; }
    .btn { padding: 10px 20px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; font-size: 14px; }
    .btn-primary { background: linear-gradient(135deg, #00F0FF, #4EC9B0); color: #0B0B0B; }
    .btn-secondary { background: #2d2d2d; color: white; border: 1px solid #4b5563; }
    .instruction { background: rgba(0, 240, 255, 0.1); border-left: 3px solid #00F0FF; padding: 15px; margin-top: 20px; text-align: left; border-radius: 8px; }
    .instruction h4 { color: #00F0FF; margin-bottom: 10px; }
    .instruction li { margin: 6px 0; color: #d1d5db; font-size: 13px; }
  </style>
</head>
<body>
  <div class="qr-container">
    <div class="bns-letters"><span>B</span><span>N</span><span>S</span></div>
    <div style="color: #00F0FF; font-size: 11px;">.com</div>
    <h1>Your Login QR Code</h1>
    <p style="color: #9ca3af; font-size: 13px;">Scan with your phone camera</p>
    
    <div class="qr-code"><img id="qrImage" src="" alt="QR Code"></div>
    
    <div class="token-box">
      <p>📱 Can't scan? Copy this token:</p>
      <div class="token-value" id="tokenValue">Loading...</div>
    </div>
    
    <div class="button-group">
      <button class="btn btn-primary" onclick="downloadQR()">💾 Save QR Code</button>
      <button class="btn btn-secondary" onclick="copyToken()">📋 Copy Token</button>
    </div>
    
    <div class="instruction">
      <h4>📖 How to use:</h4>
      <ol>
        <li><strong>Scan QR code</strong> with your phone camera</li>
        <li>OR <strong>copy the token</strong> and paste in manual entry</li>
        <li>You'll be automatically logged in</li>
        <li>Your attendance will be recorded</li>
      </ol>
    </div>
  </div>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    let qrData = urlParams.get('qr');
    let qrToken = urlParams.get('token');
    
    if (qrData) {
      document.getElementById('qrImage').src = qrData;
      document.getElementById('tokenValue').textContent = qrToken || 'Ready';
    }
    
    function downloadQR() {
      const link = document.createElement('a');
      link.download = 'bns-wfms-qrcode.png';
      link.href = document.getElementById('qrImage').src;
      link.click();
      alert('QR code saved!');
    }
    
    function copyToken() {
      const token = document.getElementById('tokenValue').textContent;
      if (token && token !== 'Loading...') {
        navigator.clipboard.writeText(token);
        alert('Token copied to clipboard!\n\nYou can now use "Manual QR Entry" on login page.');
      }
    }
  </script>
</body>
</html>

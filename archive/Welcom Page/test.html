
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Workforce Management System — Welcome</title>
  <meta name="description" content="Enterprise workforce management solution with advanced React features" />
  <meta name="theme-color" content="#0c1222" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/framer-motion@10.16.4/dist/framer-motion.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/zustand@4.4.7/index.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-query@3.39.3/dist/react-query.production.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      transition: background 0.3s ease;
    }
    
    .dark body {
      background: linear-gradient(135deg, #1a1c2c 0%, #2d1b3a 100%);
    }
    
    #root {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 10px;
    }
    
    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.1);
    }
    
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 5px;
    }
    
    /* Loading animation */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .loading-spinner {
      animation: spin 1s linear infinite;
    }
    
    /* QR code pulse animation */
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    .qr-pulse {
      animation: pulse 2s ease-in-out infinite;
    }
    
    /* Confetti animation */
    @keyframes confetti-fall {
      0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
    
    .confetti {
      position: fixed;
      pointer-events: none;
      animation: confetti-fall linear forwards;
      z-index: 9999;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    // Advanced React Features Implementation
    const { useState, useEffect, useCallback, useMemo, useRef, useReducer, useContext, createContext, lazy, Suspense } = React;
    const { createRoot } = ReactDOM;
    const { motion, AnimatePresence } = window.framerMotion;
    const { create } = window.zustand;
    const { QueryClient, QueryClientProvider, useQuery } = window.ReactQuery;

    // ==================== ADVANCED STATE MANAGEMENT ====================
    // Zustand Store with multiple slices
    const useStore = create((set, get) => ({
      // Theme slice
      theme: localStorage.getItem('theme') || 'light',
      setTheme: (theme) => {
        localStorage.setItem('theme', theme);
        set({ theme });
        document.documentElement.classList.toggle('dark', theme === 'dark');
      },
      toggleTheme: () => set((state) => {
        const newTheme = state.theme === 'light' ? 'dark' : 'light';
        localStorage.setItem('theme', newTheme);
        document.documentElement.classList.toggle('dark', newTheme === 'dark');
        return { theme: newTheme };
      }),

      // QR slice
      qrVisible: false,
      qrData: null,
      qrHistory: [],
      toggleQR: () => set((state) => ({ qrVisible: !state.qrVisible })),
      setQRData: (data) => set((state) => ({ 
        qrData: data,
        qrHistory: [...state.qrHistory, { data, timestamp: Date.now() }]
      })),
      
      // User slice
      user: null,
      setUser: (user) => set({ user }),
      
      // Analytics slice
      analytics: {
        pageViews: 0,
        qrGenerations: 0,
        themeToggles: 0
      },
      incrementPageViews: () => set((state) => ({ 
        analytics: { ...state.analytics, pageViews: state.analytics.pageViews + 1 } 
      })),
      incrementQRGenerations: () => set((state) => ({ 
        analytics: { ...state.analytics, qrGenerations: state.analytics.qrGenerations + 1 } 
      })),
      incrementThemeToggles: () => set((state) => ({ 
        analytics: { ...state.analytics, themeToggles: state.analytics.themeToggles + 1 } 
      }))
    }));

    // ==================== CONTEXT API FOR THEME ====================
    const ThemeContext = createContext();
    const ThemeProvider = ({ children }) => {
      const { theme, toggleTheme } = useStore();
      return (
        <ThemeContext.Provider value={{ theme, toggleTheme }}>
          {children}
        </ThemeContext.Provider>
      );
    };

    // Custom hook for theme
    const useTheme = () => {
      const context = useContext(ThemeContext);
      if (!context) throw new Error('useTheme must be used within ThemeProvider');
      return context;
    };

    // ==================== REACT QUERY SETUP ====================
    const queryClient = new QueryClient({
      defaultOptions: {
        queries: {
          refetchOnWindowFocus: false,
          retry: 1,
          staleTime: 5 * 60 * 1000,
        },
      },
    });

    // ==================== CUSTOM HOOKS ====================
    
    // useLocalStorage hook
    const useLocalStorage = (key, initialValue) => {
      const [storedValue, setStoredValue] = useState(() => {
        try {
          const item = window.localStorage.getItem(key);
          return item ? JSON.parse(item) : initialValue;
        } catch (error) {
          console.error(error);
          return initialValue;
        }
      });

      const setValue = (value) => {
        try {
          const valueToStore = value instanceof Function ? value(storedValue) : value;
          setStoredValue(valueToStore);
          window.localStorage.setItem(key, JSON.stringify(valueToStore));
        } catch (error) {
          console.error(error);
        }
      };

      return [storedValue, setValue];
    };

    // useWindowSize hook
    const useWindowSize = () => {
      const [windowSize, setWindowSize] = useState({
        width: window.innerWidth,
        height: window.innerHeight,
      });

      useEffect(() => {
        const handleResize = () => {
          setWindowSize({
            width: window.innerWidth,
            height: window.innerHeight,
          });
        };

        window.addEventListener('resize', handleResize);
        return () => window.removeEventListener('resize', handleResize);
      }, []);

      return windowSize;
    };

    // useIntersectionObserver hook
    const useIntersectionObserver = (ref, options) => {
      const [isVisible, setIsVisible] = useState(false);

      useEffect(() => {
        const observer = new IntersectionObserver(([entry]) => {
          setIsVisible(entry.isIntersecting);
        }, options);

        if (ref.current) {
          observer.observe(ref.current);
        }

        return () => {
          if (ref.current) {
            observer.unobserve(ref.current);
          }
        };
      }, [ref, options]);

      return isVisible;
    };

    // useDebounce hook
    const useDebounce = (value, delay) => {
      const [debouncedValue, setDebouncedValue] = useState(value);

      useEffect(() => {
        const handler = setTimeout(() => {
          setDebouncedValue(value);
        }, delay);

        return () => clearTimeout(handler);
      }, [value, delay]);

      return debouncedValue;
    };

    // ==================== COMPONENTS ====================

    // Confetti Component
    const Confetti = ({ isActive }) => {
      const [pieces, setPieces] = useState([]);
      
      useEffect(() => {
        if (isActive) {
          const newPieces = Array.from({ length: 50 }, (_, i) => ({
            id: i,
            left: Math.random() * 100,
            width: Math.random() * 10 + 5,
            height: Math.random() * 10 + 5,
            color: `hsl(${Math.random() * 360}, 100%, 50%)`,
            delay: Math.random() * 2,
            duration: Math.random() * 3 + 2,
          }));
          setPieces(newPieces);
          
          const timer = setTimeout(() => {
            setPieces([]);
          }, 5000);
          
          return () => clearTimeout(timer);
        }
      }, [isActive]);

      return (
        <AnimatePresence>
          {pieces.map((piece) => (
            <motion.div
              key={piece.id}
              className="confetti"
              initial={{ y: -20, x: `${piece.left}vw`, opacity: 1 }}
              animate={{ y: '100vh', rotate: 720 }}
              exit={{ opacity: 0 }}
              transition={{
                duration: piece.duration,
                delay: piece.delay,
                ease: "linear"
              }}
              style={{
                left: `${piece.left}vw`,
                width: piece.width,
                height: piece.height,
                backgroundColor: piece.color,
              }}
            />
          ))}
        </AnimatePresence>
      );
    };

    // QR Code Component with advanced features
    const QRCodeSection = ({ onGenerate }) => {
      const { qrVisible, qrData, toggleQR, incrementQRGenerations } = useStore();
      const [isGenerating, setIsGenerating] = useState(false);
      const [qrSize, setQrSize] = useState(300);
      const qrRef = useRef(null);
      const isVisible = useIntersectionObserver(qrRef, { threshold: 0.5 });
      const windowSize = useWindowSize();

      const generateQR = useCallback(async () => {
        setIsGenerating(true);
        incrementQRGenerations();
        
        // Simulate async QR generation
        await new Promise(resolve => setTimeout(resolve, 1000));
        
        const timestamp = Date.now();
        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=${qrSize}x${qrSize}&data=https://workforcemanager.com/access?t=${timestamp}&session=${Math.random().toString(36).substring(7)}`;
        
        onGenerate?.(qrUrl);
        toggleQR();
        setIsGenerating(false);
      }, [qrSize, onGenerate, toggleQR, incrementQRGenerations]);

      // Responsive QR size
      useEffect(() => {
        if (windowSize.width < 768) {
          setQrSize(250);
        } else {
          setQrSize(300);
        }
      }, [windowSize.width]);

      return (
        <motion.div 
          ref={qrRef}
          className="flex flex-col items-center gap-6"
          initial={{ opacity: 0, y: 20 }}
          animate={{ opacity: 1, y: 0 }}
          transition={{ duration: 0.6 }}
        >
          <motion.button
            className="px-8 py-4 bg-gradient-to-r from-blue-600 to-purple-600 text-white rounded-xl font-semibold text-lg shadow-lg hover:shadow-xl transform transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-3"
            onClick={generateQR}
            disabled={isGenerating}
            whileHover={{ scale: 1.05 }}
            whileTap={{ scale: 0.95 }}
          >
            {isGenerating ? (
              <>
                <svg className="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                  <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                  <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Generating...
              </>
            ) : (
              <>
                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z" />
                </svg>
                Generate QR Code
              </>
            )}
          </motion.button>

          <AnimatePresence>
            {qrVisible && qrData && (
              <motion.div 
                className="bg-white p-6 rounded-2xl shadow-2xl qr-pulse"
                initial={{ opacity: 0, scale: 0.8, y: -20 }}
                animate={{ opacity: 1, scale: 1, y: 0 }}
                exit={{ opacity: 0, scale: 0.8, y: 20 }}
                transition={{ type: "spring", stiffness: 200, damping: 20 }}
              >
                <img 
                  src={qrData} 
                  alt="Workforce System QR Code" 
                  className="w-full max-w-[300px] h-auto rounded-lg"
                  loading="lazy"
                />
                <motion.p 
                  className="mt-4 text-sm text-gray-600 text-center"
                  initial={{ opacity: 0 }}
                  animate={{ opacity: 1 }}
                  transition={{ delay: 0.3 }}
                >
                  Scan to access the workforce management system on mobile
                </motion.p>
                <div className="mt-2 text-xs text-gray-400 text-center">
                  Valid for 24 hours • One-time use
                </div>
              </motion.div>
            )}
          </AnimatePresence>
        </motion.div>
      );
    };

    // Feature Card Component with animations
    const FeatureCard = ({ icon, title, description, index }) => {
      const cardRef = useRef(null);
      const isVisible = useIntersectionObserver(cardRef, { threshold: 0.3 });

      return (
        <motion.div
          ref={cardRef}
          className="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-lg hover:shadow-xl transition-shadow duration-300"
          initial={{ opacity: 0, y: 50 }}
          animate={isVisible ? { opacity: 1, y: 0 } : { opacity: 0, y: 50 }}
          transition={{ duration: 0.5, delay: index * 0.1 }}
          whileHover={{ scale: 1.05, rotateY: 5 }}
        >
          <div className="text-4xl mb-4">{icon}</div>
          <h3 className="text-xl font-semibold mb-2 dark:text-white">{title}</h3>
          <p className="text-gray-600 dark:text-gray-300">{description}</p>
        </motion.div>
      );
    };

    // Footer Component with advanced features
    const Footer = () => {
      const { analytics } = useStore();
      const [email, setEmail] = useState('');
      const [subscribed, setSubscribed] = useState(false);
      const debouncedEmail = useDebounce(email, 500);
      const footerRef = useRef(null);
      const isVisible = useIntersectionObserver(footerRef, { threshold: 0.1 });
      const currentYear = new Date().getFullYear();

      // Email validation
      const isValidEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(debouncedEmail);

      const handleSubscribe = (e) => {
        e.preventDefault();
        if (isValidEmail) {
          setSubscribed(true);
          setTimeout(() => setSubscribed(false), 3000);
          setEmail('');
        }
      };

      return (
        <motion.footer 
          ref={footerRef}
          className="bg-gray-900 text-white pt-12 pb-6 mt-16"
          initial={{ opacity: 0 }}
          animate={isVisible ? { opacity: 1 } : { opacity: 0 }}
          transition={{ duration: 0.8 }}
        >
          <div className="container mx-auto px-4">
            <div className="grid grid-cols-1 md:grid-cols-4 gap-8 mb-8">
              {/* Company Info */}
              <motion.div
                initial={{ x: -50, opacity: 0 }}
                animate={isVisible ? { x: 0, opacity: 1 } : { x: -50, opacity: 0 }}
                transition={{ duration: 0.5, delay: 0.1 }}
              >
                <h3 className="text-xl font-bold mb-4 bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">
                  WorkforceManager
                </h3>
                <p className="text-gray-400 mb-4">
                  Enterprise workforce management solution for modern businesses.
                </p>
                <div className="flex space-x-4">
                  <motion.a 
                    href="#" 
                    className="text-gray-400 hover:text-white transition-colors"
                    whileHover={{ scale: 1.2, rotate: 5 }}
                  >
                    <span className="sr-only">Twitter</span>
                    <svg className="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                      <path d="M8.29 20.251c7.547 0 11.675-6.253 11.675-11.675 0-.178 0-.355-.012-.53A8.348 8.348 0 0022 5.92a8.19 8.19 0 01-2.357.646 4.118 4.118 0 001.804-2.27 8.224 8.224 0 01-2.605.996 4.107 4.107 0 00-6.993 3.743 11.65 11.65 0 01-8.457-4.287 4.106 4.106 0 001.27 5.477A4.072 4.072 0 012.8 9.713v.052a4.105 4.105 0 003.292 4.022 4.095 4.095 0 01-1.853.07 4.108 4.108 0 003.834 2.85A8.233 8.233 0 012 18.407a11.616 11.616 0 006.29 1.84" />
                    </svg>
                  </motion.a>
                  <motion.a 
                    href="#" 
                    className="text-gray-400 hover:text-white transition-colors"
                    whileHover={{ scale: 1.2, rotate: 5 }}
                  >
                    <span className="sr-only">LinkedIn</span>
                    <svg className="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                      <path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z" />
                    </svg>
                  </motion.a>
                  <motion.a 
                    href="#" 
                    className="text-gray-400 hover:text-white transition-colors"
                    whileHover={{ scale: 1.2, rotate: 5 }}
                  >
                    <span className="sr-only">GitHub</span>
                    <svg className="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                      <path fillRule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clipRule="evenodd" />
                    </svg>
                  </motion.a>
                </div>
              </motion.div>

              {/* Quick Links */}
              <motion.div
                initial={{ x: -50, opacity: 0 }}
                animate={isVisible ? { x: 0, opacity: 1 } : { x: -50, opacity: 0 }}
                transition={{ duration: 0.5, delay: 0.2 }}
              >
                <h4 className="font-semibold mb-4">Quick Links</h4>
                <ul className="space-y-2 text-gray-400">
                  {['About Us', 'Careers', 'Press', 'Blog'].map((item, i) => (
                    <motion.li 
                      key={item}
                      whileHover={{ x: 5 }}
                      transition={{ type: "spring", stiffness: 300 }}
                    >
                      <a href="#" className="hover:text-white transition-colors">{item}</a>
                    </motion.li>
                  ))}
                </ul>
              </motion.div>

              {/* Product */}
              <motion.div
                initial={{ x: -50, opacity: 0 }}
                animate={isVisible ? { x: 0, opacity: 1 } : { x: -50, opacity: 0 }}
                transition={{ duration: 0.5, delay: 0.3 }}
              >
                <h4 className="font-semibold mb-4">Product</h4>
                <ul className="space-y-2 text-gray-400">
                  {['Features', 'Pricing', 'Integrations', 'API'].map((item, i) => (
                    <motion.li 
                      key={item}
                      whileHover={{ x: 5 }}
                      transition={{ type: "spring", stiffness: 300 }}
                    >
                      <a href="#" className="hover:text-white transition-colors">{item}</a>
                    </motion.li>
                  ))}
                </ul>
              </motion.div>

              {/* Newsletter */}
              <motion.div
                initial={{ x: -50, opacity: 0 }}
                animate={isVisible ? { x: 0, opacity: 1 } : { x: -50, opacity: 0 }}
                transition={{ duration: 0.5, delay: 0.4 }}
              >
                <h4 className="font-semibold mb-4">Newsletter</h4>
                <p className="text-gray-400 mb-2">Subscribe to get updates</p>
                <form onSubmit={handleSubscribe} className="space-y-2">
                  <input
                    type="email"
                    value={email}
                    onChange={(e) => setEmail(e.target.value)}
                    placeholder="Your email"
                    className="w-full px-3 py-2 bg-gray-800 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500"
                  />
                  <motion.button
                    type="submit"
                    className={`w-full py-2 rounded-lg font-semibold transition-colors ${
                      isValidEmail 
                        ? 'bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700' 
                        : 'bg-gray-700 cursor-not-allowed'
                    }`}
                    disabled={!isValidEmail}
                    whileHover={isValidEmail ? { scale: 1.02 } : {}}
                    whileTap={isValidEmail ? { scale: 0.98 } : {}}
                  >
                    Subscribe
                  </motion.button>
                </form>
                <AnimatePresence>
                  {subscribed && (
                    <motion.p
                      initial={{ opacity: 0, y: -10 }}
                      animate={{ opacity: 1, y: 0 }}
                      exit={{ opacity: 0 }}
                      className="text-green-400 text-sm mt-2"
                    >
                      ✓ Successfully subscribed!
                    </motion.p>
                  )}
                </AnimatePresence>
              </motion.div>
            </div>

            {/* Copyright and Legal */}
            <motion.div 
              className="border-t border-gray-800 pt-6 mt-6"
              initial={{ opacity: 0, y: 20 }}
              animate={isVisible ? { opacity: 1, y: 0 } : { opacity: 0, y: 20 }}
              transition={{ duration: 0.5, delay: 0.5 }}
            >
              <div className="flex flex-col md:flex-row justify-between items-center gap-4">
                <div className="text-gray-400 text-sm">
                  © {currentYear} WorkforceManager, Inc. All rights reserved.
                </div>
                <div className="flex flex-wrap gap-4 text-sm">
                  {['Privacy Policy', 'Terms of Service', 'Cookie Policy', 'GDPR Compliance', 'Security'].map((item) => (
                    <motion.a
                      key={item}
                      href="#"
                      className="text-gray-400 hover:text-white transition-colors"
                      whileHover={{ scale: 1.05 }}
                    >
                      {item}
                    </motion.a>
                  ))}
                </div>
                <div className="text-gray-500 text-xs">
                  v2.4.1 • {analytics.pageViews} views
                </div>
              </div>
            </motion.div>
          </div>
        </motion.footer>
      );
    };

    // Navigation Component
    const Navigation = () => {
      const { theme, toggleTheme } = useStore();
      const [scrolled, setScrolled] = useState(false);

      useEffect(() => {
        const handleScroll = () => {
          setScrolled(window.scrollY > 50);
        };
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      return (
        <motion.nav

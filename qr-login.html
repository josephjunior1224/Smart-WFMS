<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>QR Login - BNS WFMS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0B0B0B 0%, #1a1a1a 100%);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-container {
      background: #1a1a1a;
      border: 1px solid #2d2d2d;
      border-radius: 24px;
      padding: 40px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
    }
    .bns-letters { display: flex; justify-content: center; gap: 5px; font-size: 48px; font-weight: 900; margin-bottom: 20px; }
    .bns-letters span { background: linear-gradient(135deg, #00F0FF, #4EC9B0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .spinner { width: 50px; height: 50px; border: 3px solid #2d2d2d; border-top-color: #00F0FF; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .success-icon, .error-icon { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 30px; }
    .success-icon { background: #10b981; }
    .error-icon { background: #ef4444; }
    h2 { color: white; margin-bottom: 10px; }
    p { color: #9ca3af; margin-bottom: 20px; }
    .btn { padding: 12px 24px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; transition: all 0.3s ease; background: linear-gradient(135deg, #00F0FF, #4EC9B0); color: #0B0B0B; margin-top: 20px; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0, 240, 255, 0.3); }
    .attendance-note { background: rgba(0, 240, 255, 0.1); border-radius: 8px; padding: 10px; margin-top: 15px; font-size: 12px; color: #00F0FF; }
  </style>
</head>
<body>
  <div class="login-container" id="loginContainer">
    <div class="bns-letters"><span>B</span><span>N</span><span>S</span></div>
    <div class="spinner"></div>
    <h2>Authenticating...</h2>
    <p>Please wait while we verify your QR code</p>
  </div>
  <script>
    const API_BASE = '/api';
    
    async function processQRLogin() {
      let token = new URLSearchParams(window.location.search).get('token');
      
      if (!token && window.location.hash) {
        const hashMatch = window.location.hash.match(/token=([^&]+)/);
        if (hashMatch) token = hashMatch[1];
      }
      
      if (!token) {
        showError('Invalid QR Code', 'No token found. Please scan a valid QR code.');
        return;
      }
      
      // Clean the token
      if (token.includes('/')) token = token.split('/').pop();
      if (token.includes('?')) token = token.split('?')[0];
      if (token.includes('token=')) {
        const match = token.match(/token=([^&]+)/);
        if (match) token = match[1];
      }
      if (token.includes('%')) token = decodeURIComponent(token);
      
      try {
        const response = await fetch(`${API_BASE}/qr-login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token })
        });
        
        const data = await response.json();
        
        if (data.ok) {
          // Save tokens
          localStorage.setItem('token', data.token);
          if (data.refreshToken) localStorage.setItem('refreshToken', data.refreshToken);
          
          // Show success with attendance info
          let attendanceMessage = '';
          if (data.attendanceRecorded) {
            attendanceMessage = '<div class="attendance-note">✅ Attendance recorded for today!</div>';
          }
          
          document.getElementById('loginContainer').innerHTML = `
            <div class="bns-letters"><span>B</span><span>N</span><span>S</span></div>
            <div class="success-icon">✓</div>
            <h2>Welcome back, ${escapeHtml(data.user.name)}!</h2>
            <p>You have been successfully logged in.</p>
            ${attendanceMessage}
            <p style="font-size: 12px; margin-top: 10px;">Redirecting to dashboard...</p>
          `;
          
          // Redirect to dashboard after 1.5 seconds
          setTimeout(() => {
            window.location.href = '/';
          }, 1500);
        } else {
          showError('Login Failed', data.error || 'Unable to authenticate with this QR code');
        }
      } catch (err) {
        console.error('QR login error:', err);
        showError('Connection Error', err.message);
      }
    }
    
    function showError(title, message) {
      document.getElementById('loginContainer').innerHTML = `
        <div class="bns-letters"><span>B</span><span>N</span><span>S</span></div>
        <div class="error-icon">✗</div>
        <h2 style="color: #ef4444;">${escapeHtml(title)}</h2>
        <p>${escapeHtml(message)}</p>
        <button class="btn" onclick="window.location.href='/'">Back to Login</button>
      `;
    }
    
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }
    
    // Start the login process
    processQRLogin();
  </script>
</body>
</html>
